<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#1a1a1a;color:#f5e6c8;}
header{text-align:center;padding:15px;font-size:22px;font-weight:bold;color:#ffd700;background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);} 
nav{display:flex;justify-content:center;background:#5a3d2b;}
nav button{padding:10px;border:none;color:#ffd700;background:none;cursor:pointer;}
section{display:none;padding:15px;} .active{display:block;}
#map{height:80vh;}

.popup{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:999;}
.popup-inner{display:flex;gap:15px;width:95%;max-width:900px;}
.map-detail{flex:1;}
.map-detail img{width:100%;}
.info-box{width:250px;background:#fff8e7;color:#000;padding:10px;border-radius:10px;}
.close{position:absolute;top:20px;right:30px;font-size:28px;cursor:pointer;color:white;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
.card{background:#fff8e7;color:#000;padding:10px;border-radius:10px;}
</style>
</head>

<body>
<header>CỔ QUỐC KỲ ĐÀM</header>
<nav>
<button onclick="showTab('tongquan')">Tổng quan</button>
<button onclick="showTab('bando')">Bản đồ</button>
<button onclick="showTab('nghe')">Nghề</button>
</nav>

<section id="tongquan" class="active">
<h2>Tổng quan</h2>
<p>Cổ Quốc được khai sáng bởi Thiên Kiếm Lão Tổ...</p>
</section>

<section id="bando">
<div id="map"></div>
</section>

<section id="nghe">
<h2>Hệ thống nghề nghiệp</h2>
<div class="cards">
<div class="card"><b>Kiếm Tu</b><p>Sát thương cao</p></div>
<div class="card"><b>Pháp Tu</b><p>Phép diện rộng</p></div>
<div class="card"><b>Thể Tu</b><p>Chịu đòn mạnh</p></div>
</div>
</section>

<div id="popup" class="popup">
<span class="close" onclick="closePopup()">X</span>
<div class="popup-inner">
<div class="map-detail"><img id="detailImg"></div>
<div class="info-box">
<h3 id="infoTitle"></h3>
<p id="infoDesc"></p>
</div>
</div>
</div>

<script>
function showTab(id){document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

const map = L.map('map',{crs:L.CRS.Simple,minZoom:-2,maxZoom:2});
const bounds=[[0,0],[800,1500]];
L.imageOverlay('./images/bandochinh.jpg',bounds).addTo(map);
map.fitBounds(bounds);

function parsePoints(str){
 return str.split(" ").map(p=>{
  let [x,y]=p.split(",").map(Number);
  return [y,x];
 });
}

// ===== CHÂU =====
const regions=[
{name:"dongchau",label:"Đông Châu",img:"dongchau.jpg",center:[300,1000]},
{name:"taychau",label:"Tây Châu",img:"taychau.jpg",center:[300,200]},
{name:"bacchau",label:"Bắc Châu",img:"bacchau.jpg",center:[100,600]},
{name:"namchau",label:"Nam Châu",img:"namchau.jpg",center:[500,600]},
{name:"kinhquoc",label:"Kinh Quốc",img:"kinhquoc.jpg",center:[300,700]}
];

let currentLayer=[];

function clearLayer(){
 currentLayer.forEach(l=>map.removeLayer(l));
 currentLayer=[];
}

regions.forEach(r=>{
 L.marker(r.center).addTo(map).on('click',()=>{
  map.setView(r.center,1);
  popup.style.display="flex";
  detailImg.src="./images/"+r.img;
  infoTitle.innerText=r.label;
  infoDesc.innerText="Chọn địa điểm trong vùng...";

  clearLayer();

  if(maps[r.name]){
    maps[r.name].forEach(v=>{
      const poly=L.polygon(parsePoints(v[0]),{color:'yellow',fillOpacity:0.2}).addTo(map);
      poly.on('click',()=>{
        infoTitle.innerText=v[1];
        infoDesc.innerText=v[2];
      });
      currentLayer.push(poly);
    });
  }
 });
});

function closePopup(){popup.style.display="none";}

</script>
</body>
</html>
