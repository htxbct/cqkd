```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
}

header{
  text-align:center;
  padding:15px;
  color:#fff;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

.map-container{
  position:relative;
  max-width:1200px;
  margin:auto;
}

.map-bg{
  width:100%;
  display:block;
}

svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* vùng */
.region{
  fill: rgba(255,215,0,0.12);
  stroke: rgba(255,215,0,0.6);
  stroke-width:2;
  cursor:pointer;
  transition:0.3s;
}

.region:hover{
  fill: rgba(255,215,0,0.55);
  filter: drop-shadow(0 0 15px gold);
}

/* vùng click label (ẩn) */
.label{
  fill: transparent;
  cursor:pointer;
}

/* tooltip */
.tooltip{
  position:fixed;
  background:#000;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
  pointer-events:none;
  opacity:0;
}

/* popup */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#fff8e7;
  padding:20px;
  border-radius:12px;
  text-align:center;
  max-width:900px;
}

.popup img{
  width:100%;
  border-radius:10px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:24px;
}
</style>
</head>

<body>

<header>
<h1>CỔ QUỐC KỲ ĐÀM</h1>
</header>

<div class="map-container">

<img src="./images/bandochinh.jpg" id="map" class="map-bg">

<svg viewBox="0 0 1200 650">

<!-- ===== VÙNG ===== -->

<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region"
data-name="Tây Châu"
data-img="taychau.jpg"></path>

<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region"
data-name="Bắc Châu"
data-img="bacchau.jpg"></path>

<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region"
data-name="Đông Châu"
data-img="dongchau.jpg"></path>

<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region"
data-name="Nam Châu"
data-img="namchau.jpg"></path>

<ellipse cx="600" cy="300" rx="120" ry="90"
class="region"
data-name="Kinh Quốc"
data-img="kinhquoc.jpg"></ellipse>

<!-- ===== CLICK VÀO CHỮ (QUAN TRỌNG) ===== -->

<rect x="130" y="230" width="150" height="60"
class="label" data-name="Tây Châu" data-img="taychau.jpg"/>

<rect x="500" y="80" width="200" height="60"
class="label" data-name="Bắc Châu" data-img="bacchau.jpg"/>

<rect x="950" y="280" width="180" height="60"
class="label" data-name="Đông Châu" data-img="dongchau.jpg"/>

<rect x="500" y="500" width="200" height="60"
class="label" data-name="Nam Châu" data-img="namchau.jpg"/>

<rect x="520" y="260" width="160" height="60"
class="label" data-name="Kinh Quốc" data-img="kinhquoc.jpg"/>

</svg>

</div>

<div id="tooltip" class="tooltip"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">&times;</span>
    <h2 id="title"></h2>
    <img id="img">
    <p id="desc"></p>
  </div>
</div>

<script>
const tooltip = document.getElementById("tooltip");

// gộp region + label
document.querySelectorAll(".region, .label").forEach(r => {

  r.addEventListener("mousemove", e=>{
    tooltip.innerText = r.dataset.name;
    tooltip.style.left = e.clientX + 15 + "px";
    tooltip.style.top = e.clientY + 15 + "px";
    tooltip.style.opacity = 1;
  });

  r.addEventListener("mouseleave", ()=>{
    tooltip.style.opacity = 0;
  });

  r.addEventListener("click", ()=>{

    document.getElementById("popup").style.display="flex";
    document.getElementById("title").innerText = r.dataset.name;

    // FIX ẢNH
    document.getElementById("img").src =
      "./images/" + r.dataset.img + "?v=" + Date.now();

    document.getElementById("desc").innerText =
      "Thông tin về " + r.dataset.name;

  });

});

function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
```
