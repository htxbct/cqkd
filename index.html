<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
  color:#f5e6c8;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  color:#ffd700;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  background:#5a3d2b;
}

nav button{
  padding:10px;
  border:none;
  color:#ffd700;
  background:none;
  cursor:pointer;
}

/* LOGIN */
.login{
  text-align:center;
  padding:10px;
  background:#2c1b10;
}

.login input{
  padding:5px;
  margin:3px;
}

/* SECTION */
section{
  display:none;
  padding:15px;
}
.active{
  display:block;
}

/* MAP */
.map-container{
  position:relative;
}
.map-bg{ width:100%; }

svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}

.region{
  fill:transparent;
  cursor:pointer;
}

/* JOB */
.job-list{
  display:flex;
  justify-content:space-around;
  margin-bottom:20px;
}

.job-item{
  padding:10px;
  border:2px solid #555;
  border-radius:8px;
  width:22%;
  text-align:center;
  transition:0.3s;
}

.active-job{
  border:2px solid gold;
  box-shadow:0 0 20px gold;
}

.spin-btn{
  padding:12px 20px;
  background:gold;
  border:none;
  cursor:pointer;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#fff8e7;
  color:#000;
  padding:15px;
  border-radius:10px;
  max-width:90%;
}

.popup img{
  width:100%;
}
</style>
</head>

<body>

<header>CỔ QUỐC KỲ ĐÀM</header>

<!-- LOGIN -->
<div class="login">
<input id="username" placeholder="Tên">
<input id="password" type="password" placeholder="Mật khẩu">
<button onclick="login()">Đăng nhập</button>
<span id="userDisplay"></span>
</div>

<nav>
<button onclick="show('tongquan')">Tổng quan</button>
<button onclick="show('bando')">Bản đồ</button>
<button onclick="show('nghe')">Quay nghề</button>
<button onclick="show('luat')">Luật</button>
</nav>

<!-- TỔNG QUAN -->
<section id="tongquan">
<h2>Tổng quan</h2>
<p>Cổ Quốc được khai sáng bởi Thiên Kiếm Lão Tổ...</p>
</section>

<!-- BẢN ĐỒ -->
<section id="bando">
<div class="map-container">
<img src="./images/bandochinh.jpg" class="map-bg">

<svg viewBox="0 0 1200 650">
<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region" data-name="Tây Châu" data-img="taychau.jpg"/>
<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region" data-name="Bắc Châu" data-img="bacchau.jpg"/>
<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region" data-name="Đông Châu" data-img="dongchau.jpg"/>
<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region" data-name="Nam Châu" data-img="namchau.jpg"/>
<ellipse cx="600" cy="300" rx="120" ry="90"
class="region" data-name="Kinh Quốc" data-img="kinhquoc.jpg"/>
</svg>
</div>
</section>

<!-- NGHỀ -->
<section id="nghe">
<h2>🎲 Quay nghề</h2>

<div class="job-list">
<div class="job-item" id="job0">Y sư</div>
<div class="job-item" id="job1">Thương nhân</div>
<div class="job-item" id="job2">Nông dân</div>
<div class="job-item" id="job3">Quý tộc</div>
</div>

<button class="spin-btn" onclick="spinJob()">QUAY</button>

<p id="result"></p>
<p id="turn"></p>
</section>

<!-- LUẬT -->
<section id="luat">
<h2>Luật lệ</h2>
<p>Các quy tắc của Cổ Quốc...</p>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-content">
<span onclick="closePopup()">X</span>
<h2 id="title"></h2>
<img id="img">
</div>
</div>

<script>

// ===== ACCOUNT =====
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];
let currentUser = null;

// LOGIN
function login(){
let u = username.value;
let p = password.value;

let acc = accounts.find(a=>a.user===u && a.pass===p);

if(!acc) return alert("Sai tài khoản!");

currentUser = acc;
userDisplay.innerText = "👤 " + u;

turn.innerText = "Lượt quay: " + acc.turns;
}

// TAB
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
localStorage.setItem("page", id);
}

// LOAD
window.onload = function(){
let page = localStorage.getItem("page") || "tongquan";
show(page);
}

// MAP
document.querySelectorAll(".region").forEach(r=>{
r.onclick=()=>{
popup.style.display="flex";
title.innerText=r.dataset.name;
img.src="./images/"+r.dataset.img;
}
});

function closePopup(){
popup.style.display="none";
}

// JOB
const jobs = ["Y sư","Thương nhân","Nông dân","Quý tộc"];

function spinJob(){

if(!currentUser) return alert("Đăng nhập trước!");
if(currentUser.turns <= 0) return alert("Hết lượt!");

let i=0;

let interval = setInterval(()=>{

document.querySelectorAll(".job-item").forEach(j=>j.classList.remove("active-job"));

document.getElementById("job"+(i%4)).classList.add("active-job");

i++;

if(i>10){

clearInterval(interval);

let resultIndex = Math.floor(Math.random()*4);

document.querySelectorAll(".job-item").forEach(j=>j.classList.remove("active-job"));
document.getElementById("job"+resultIndex).classList.add("active-job");

result.innerText = "Bạn là: " + jobs[resultIndex];

currentUser.turns--;
localStorage.setItem("accounts", JSON.stringify(accounts));

turn.innerText = "Lượt quay: " + currentUser.turns;

}

},150);

}

</script>

</body>
</html>
