<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#1a1a1a;
  color:#f5e6c8;
}

header{
  text-align:center;
  padding:12px;
  font-size:20px;
  color:#ffd700;
  background:#5a3d2b;
}

nav{
  display:flex;
  justify-content:space-around;
  background:#3b2a1d;
}
nav button{
  flex:1;
  padding:10px;
  border:none;
  background:none;
  color:#ffd700;
}

section{display:none;padding:10px;}
.active{display:block;}

.map-wrap img{
  width:100%;
}

/* popup */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}
.box{
  background:#fff8e7;
  color:#000;
  padding:15px;
  border-radius:10px;
}
.close{
  position:absolute;
  top:10px;
  right:15px;
  color:white;
  font-size:24px;
}
</style>
</head>

<body>

<header>CỔ QUỐC KỲ ĐÀM</header>

<nav>
<button onclick="tab('tongquan')">Tổng quan</button>
<button onclick="tab('bando')">Bản đồ</button>
<button onclick="tab('nghe')">Nghề</button>
</nav>

<!-- TỔNG QUAN -->
<section id="tongquan" class="active">
<h3>Tổng quan</h3>
<p>Thiên hạ chia 5 châu: Đông - Tây - Nam - Bắc - Kinh Quốc.</p>
</section>

<!-- BẢN ĐỒ -->
<section id="bando">

<div class="map-wrap">
<img src="images/kinhquoc.jpg" usemap="#kinhquoc">
</div>

<map name="kinhquoc">
<area coords="600,240,820,240,830,350,600,350" shape="poly"
onclick="info('Cung Thái Hòa','Trung tâm quyền lực')">
</map>

<div class="map-wrap">
<img src="images/dongchau.jpg" usemap="#dongchau">
</div>

<map name="dongchau">
<area coords="900,300,1150,320,1150,500,900,480" shape="poly"
onclick="info('Hải Cảng','Trung tâm giao thương')">
</map>

<div class="map-wrap">
<img src="images/namchau.jpg" usemap="#namchau">
</div>

<map name="namchau">
<area coords="500,300,800,300,800,500,500,500" shape="poly"
onclick="info('Ruộng Lúa','Vựa lúa')">
</map>

<div class="map-wrap">
<img src="images/bacchau.jpg" usemap="#bacchau">
</div>

<map name="bacchau">
<area coords="500,250,750,250,750,400,500,400" shape="poly"
onclick="info('Hồ Băng Nguyệt','Trung tâm')">
</map>

<div class="map-wrap">
<img src="images/taychau.jpg" usemap="#taychau">
</div>

<map name="taychau">
<area coords="400,200,900,200,900,450,400,450" shape="poly"
onclick="info('Hoang Mạc','Sa mạc')">
</map>

</section>

<!-- NGHỀ -->
<section id="nghe">
<h3>Nghề nghiệp</h3>
<p>⚔️ Kiếm Khách</p>
<p>🏹 Cung Thủ</p>
<p>🧙 Pháp Sư</p>
</section>

<!-- POPUP -->
<div class="popup" id="pop">
<div class="close" onclick="closePop()">✖</div>
<div class="box">
<h3 id="title"></h3>
<p id="desc"></p>
</div>
</div>

<script>

function tab(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function info(t,d){
pop.style.display="flex";
title.innerText=t;
desc.innerText=d;
}

function closePop(){
pop.style.display="none";
}

</script>

</body>
</html>
