<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body { margin:0; font-family:'Segoe UI'; background:#fff8e7; color:#4b2e2e; }
header { background:linear-gradient(90deg,#d4a373,#fff,#8b5e3c); text-align:center; padding:20px; }
nav { display:flex; justify-content:center; background:#8b5e3c; }
nav a { color:white; padding:12px 18px; cursor:pointer; }
nav a:hover { background:#d4a373; }
section { display:none; padding:20px; }
.active { display:block; }

.map-container { position:relative; max-width:900px; margin:auto; }
.map-container img { width:100%; }

.area {
 position:absolute;
 border-radius:50%;
 cursor:pointer;
 transition:0.3s;
}

/* highlight vùng */
.area:hover {
 background: rgba(255,215,0,0.35);
 box-shadow:0 0 25px gold;
}

.tooltip {
 position:absolute;
 background:#4b2e2e;
 color:white;
 padding:5px 10px;
 border-radius:5px;
 font-size:12px;
 display:none;
 pointer-events:none;
}

</style>
</head>
<body>

<header><h1>CỔ QUỐC KỲ ĐÀM</h1></header>

<nav>
<a onclick="showSection('tongquan')">Tổng quan</a>
<a onclick="showSection('bando')">Bản đồ</a>
<a onclick="showSection('nghenghiep')">Nghề nghiệp</a>
<a onclick="showSection('khac')">Khác</a>
</nav>

<section id="tongquan" class="active">
<h2>Giới thiệu</h2>
<p>Cổ Quốc là vùng đất huyền thoại.</p>
</section>

<section id="bando">
<h2>Bản đồ</h2>

<div class="map-container">
<img src="./images/bandochinh.jpg">

<!-- Đông châu -->
<div class="area" style="top:25%;left:70%;width:120px;height:120px;"
 onmouseenter="showTip(event,'Đông Châu')"
 onmouseleave="hideTip()"
 onclick="goToPage('dongchau')"></div>

<!-- Bắc châu -->
<div class="area" style="top:5%;left:40%;width:120px;height:120px;"
 onmouseenter="showTip(event,'Bắc Châu')"
 onmouseleave="hideTip()"
 onclick="goToPage('bacchau')"></div>

<!-- Tây châu -->
<div class="area" style="top:35%;left:5%;width:120px;height:120px;"
 onmouseenter="showTip(event,'Tây Châu')"
 onmouseleave="hideTip()"
 onclick="goToPage('taychau')"></div>

<!-- Nam châu -->
<div class="area" style="top:70%;left:40%;width:120px;height:120px;"
 onmouseenter="showTip(event,'Nam Châu')"
 onmouseleave="hideTip()"
 onclick="goToPage('namchau')"></div>

<!-- Kinh quốc -->
<div class="area" style="top:40%;left:45%;width:120px;height:120px;"
 onmouseenter="showTip(event,'Kinh Quốc')"
 onmouseleave="hideTip()"
 onclick="goToPage('kinhquoc')"></div>

<div id="tooltip" class="tooltip"></div>
</div>

</section>

<section id="nghenghiep"><p>Nghề nghiệp...</p></section>
<section id="khac"><p>Khác...</p></section>

<script>
function showSection(id){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// tooltip
function showTip(e,text){
 let tip=document.getElementById('tooltip');
 tip.style.display='block';
 tip.innerText=text;
 tip.style.left=e.pageX+10+'px';
 tip.style.top=e.pageY+10+'px';
}
function hideTip(){ document.getElementById('tooltip').style.display='none'; }

// chuyển trang
function goToPage(region){
 window.location.href = region + '.html';
}
</script>

</body>
</html>
