```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
  color:#f5e6c8;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
  color:#ffd700;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  background:#5a3d2b;
}

nav button{
  padding:12px 20px;
  background:none;
  border:none;
  color:#ffd700;
  cursor:pointer;
  font-size:16px;
}

nav button:hover{
  background:#c9a66b;
  color:#000;
}

/* SECTION */
section{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* BACK BUTTON */
.back-btn{
  margin-bottom:10px;
  padding:8px 15px;
  background:#c9a66b;
  border:none;
  cursor:pointer;
}

/* ===== MAP (GIỮ NGUYÊN) ===== */
.map-container{
  position:relative;
  max-width:1200px;
  margin:auto;
  overflow:hidden;
}

.map-bg{
  width:100%;
  display:block;
  transition: transform 0.8s ease;
}

.fog{
  position:absolute;
  top:0;
  left:0;
  width:200%;
  height:100%;
  background: url('https://i.imgur.com/8IhQ9Zg.png') repeat;
  opacity:0.15;
  animation:fogMove 60s linear infinite;
  pointer-events:none;
}

@keyframes fogMove{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.region{
  fill: rgba(255,215,0,0.12);
  stroke: rgba(255,215,0,0.6);
  stroke-width:2;
  cursor:pointer;
}

.region:hover{
  fill: rgba(255,215,0,0.55);
}

.label{
  fill: transparent;
  cursor:pointer;
}

.castle{
  font-size:22px;
}

.tooltip{
  position:fixed;
  background:#000;
  color:#fff;
  padding:5px;
  opacity:0;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#fff8e7;
  color:#000;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>CỔ QUỐC KỲ ĐÀM</header>

<nav>
<button onclick="show('tongquan')">Tổng quan</button>
<button onclick="show('bando')">Bản đồ</button>
<button onclick="show('nghenghiep')">Nghề nghiệp</button>
<button onclick="show('luatle')">Luật lệ</button>
</nav>

<!-- TỔNG QUAN -->
<section id="tongquan" class="active">
<h2>Tổng quan</h2>
<p>Cổ Quốc được khai sáng bởi Thiên Kiếm Lão Tổ...</p>
</section>

<!-- BẢN ĐỒ -->
<section id="bando">
<button class="back-btn" onclick="goBack()">⬅ Quay lại</button>

<div class="map-container">
<img src="./images/bandochinh.jpg" id="map" class="map-bg">
<div class="fog"></div>

<svg viewBox="0 0 1200 650">

<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region" data-name="Tây Châu" data-img="taychau.jpg" data-x="200" data-y="300"/>

<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region" data-name="Bắc Châu" data-img="bacchau.jpg" data-x="600" data-y="120"/>

<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region" data-name="Đông Châu" data-img="dongchau.jpg" data-x="1000" data-y="300"/>

<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region" data-name="Nam Châu" data-img="namchau.jpg" data-x="600" data-y="520"/>

<ellipse cx="600" cy="300" rx="120" ry="90"
class="region" data-name="Kinh Quốc" data-img="kinhquoc.jpg" data-x="600" data-y="300"/>

</svg>
</div>
</section>

<!-- NGHỀ -->
<section id="nghenghiep">
<h2>Nghề nghiệp</h2>
<ul>
<li>Y sư</li>
<li>Thương nhân</li>
<li>Nông dân</li>
<li>Quý tộc</li>
</ul>
</section>

<!-- LUẬT -->
<section id="luatle">
<h2>Luật lệ</h2>
<p>Các quy tắc và luật lệ của Cổ Quốc...</p>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span onclick="closePopup()" style="cursor:pointer">X</span>
    <h2 id="title"></h2>
    <img id="img" style="width:100%">
  </div>
</div>

<script>
// chuyển tab
function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// back
function goBack(){
  show("tongquan");
}

// MAP CLICK
document.querySelectorAll(".region").forEach(r=>{
  r.onclick = ()=>{
    document.getElementById("popup").style.display="flex";
    document.getElementById("title").innerText = r.dataset.name;
    document.getElementById("img").src = "./images/" + r.dataset.img;
  }
});

function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
```
