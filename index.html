<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
  color:#f5e6c8;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  color:#ffd700;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  background:#5a3d2b;
}

nav button{
  padding:10px;
  border:none;
  color:#ffd700;
  background:none;
  cursor:pointer;
  font-size:14px;
}

/* SECTION */
section{
  display:none;
  padding:15px;
}

.active{
  display:block;
}

/* ===== MAP ===== */
.map-container{
  position:relative;
  width:100%;
}

.map-bg{
  width:100%;
}

svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.region{
  fill: transparent;
  cursor:pointer;
}

/* ===== JOB ===== */
.job-wrapper{
  display:flex;
  gap:15px;
}

/* GRID */
.job-grid{
  flex:1;
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
}

/* CARD */
.job-card{
  height:100px;
  border-radius:10px;
  position:relative;
  overflow:hidden;
  border:1px solid #c9a66b;
  background-size:cover;
  background-position:center;
  cursor:pointer;
}

/* overlay */
.job-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

/* text */
.job-card h3{
  position:absolute;
  bottom:5px;
  left:5px;
  font-size:14px;
  color:#ffd700;
  z-index:2;
}

/* shine */
.job-card::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,215,0,0.6),transparent);
  transform:translateX(-100%);
}

.job-card:hover::before{
  animation:shine 1s;
}

@keyframes shine{
  to{ transform:translateX(100%); }
}

/* selected */
.selected{
  outline:2px solid gold;
}

/* PANEL */
.job-panel{
  width:220px;
  background:#2c1b10;
  padding:10px;
  border-radius:10px;
}

.job-panel h2{
  font-size:16px;
}

.job-panel p{
  font-size:13px;
}

.choose-btn{
  margin-top:10px;
  padding:6px;
  width:100%;
}

/* ===== MOBILE FIX ===== */
@media(max-width:768px){

.job-wrapper{
  flex-direction:column;
}

.job-grid{
  grid-template-columns: repeat(2,1fr);
}

.job-card{
  height:90px;
}

.job-panel{
  width:100%;
}

}

/* ===== POPUP ===== */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#fff8e7;
  color:#000;
  padding:15px;
  border-radius:10px;
  max-width:90%;
}

.popup img{
  width:100%;
}
</style>
</head>

<body>

<header>CỔ QUỐC KỲ ĐÀM</header>

<nav>
<button onclick="show('tongquan')">Tổng quan</button>
<button onclick="show('bando')">Bản đồ</button>
<button onclick="show('nghenghiep')">Nghề</button>
<button onclick="show('luatle')">Luật</button>
</nav>

<section id="tongquan" class="active">
<h2>Tổng quan</h2>
<p>Cổ Quốc được khai sáng bởi Thiên Kiếm Lão Tổ...</p>
</section>

<section id="bando">
<div class="map-container">
<img src="./images/bandochinh.jpg" class="map-bg">

<svg viewBox="0 0 1200 650">
<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region" data-name="Tây Châu" data-img="taychau.jpg"/>
<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region" data-name="Bắc Châu" data-img="bacchau.jpg"/>
<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region" data-name="Đông Châu" data-img="dongchau.jpg"/>
<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region" data-name="Nam Châu" data-img="namchau.jpg"/>
<ellipse cx="600" cy="300" rx="120" ry="90"
class="region" data-name="Kinh Quốc" data-img="kinhquoc.jpg"/>
</svg>
</div>
</section>

<section id="nghenghiep">
<h2>Chọn nghề</h2>

<div class="job-wrapper">

<div class="job-grid">
<div class="job-card" style="background-image:url('./images/y.jpg')" onclick="openJob('y',this)"><h3>Y sư</h3></div>
<div class="job-card" style="background-image:url('./images/t.jpg')" onclick="openJob('t',this)"><h3>Thương nhân</h3></div>
<div class="job-card" style="background-image:url('./images/n.jpg')" onclick="openJob('n',this)"><h3>Nông dân</h3></div>
<div class="job-card" style="background-image:url('./images/q.jpg')" onclick="openJob('q',this)"><h3>Quý tộc</h3></div>
</div>

<div class="job-panel">
<h2 id="jobTitle">Chọn nghề</h2>
<p id="jobDesc">Hãy chọn con đường của bạn...</p>
<button class="choose-btn" onclick="selectJob()">Chọn nghề</button>
</div>

</div>
</section>

<section id="luatle">
<h2>Luật lệ</h2>
<p>Các quy tắc của Cổ Quốc...</p>
</section>

<div id="popup" class="popup">
<div class="popup-content">
<span onclick="closePopup()">X</span>
<h2 id="title"></h2>
<img id="img">
</div>
</div>

<script>
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

document.querySelectorAll(".region").forEach(r=>{
r.onclick=()=>{
document.getElementById("popup").style.display="flex";
document.getElementById("title").innerText=r.dataset.name;
document.getElementById("img").src="./images/"+r.dataset.img;
}
});

function closePopup(){
document.getElementById("popup").style.display="none";
}

let currentJob="";

function openJob(type,el){
document.querySelectorAll(".job-card").forEach(c=>c.classList.remove("selected"));
el.classList.add("selected");
currentJob=type;

let t="",d="";
if(type==="y"){t="Y sư";d="Cứu thế cứu nạn";}
if(type==="t"){t="Thương nhân";d="Buôn bán thiên hạ";}
if(type==="n"){t="Nông dân";d="Nuôi sống quốc gia";}
if(type==="q"){t="Quý tộc";d="Thống trị và lãnh đạo";}

jobTitle.innerText=t;
jobDesc.innerText=d;
}

function selectJob(){
if(!currentJob) return alert("Chọn nghề trước!");
alert("Bạn đã chọn: "+jobTitle.innerText);
}
</script>

</body>
</html>
