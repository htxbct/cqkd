<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
  color:#f5e6c8;
}

/* HEADER */
header{
  text-align:center;
  padding:12px;
  font-size:20px;
  font-weight:bold;
  color:#ffd700;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  background:#5a3d2b;
}

nav button{
  flex:1;
  padding:12px;
  border:none;
  color:#ffd700;
  background:none;
  font-size:15px;
}

/* SECTION */
section{ display:none; padding:12px; }
.active{ display:block; }

/* MAP */
.map-container{ position:relative; }
.map-bg{ width:100%; }

svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}

.region{ fill:transparent; cursor:pointer; }

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.popup-inner{
  display:flex;
  gap:10px;
  width:100%;
  max-width:1000px;
}

/* MAP DETAIL */
.map-detail{
  position:relative;
  flex:1;
}

.map-detail img{
  width:100%;
  border-radius:10px;
}

/* ICON */
.icon{
  position:absolute;
  font-size:24px;
  cursor:pointer;
  transform:translate(-50%,-50%);
}

.icon:active{
  transform:translate(-50%,-50%) scale(1.2);
}

/* INFO */
.info-box{
  width:260px;
  background:#fff8e7;
  color:#000;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

/* CLOSE */
.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:26px;
  cursor:pointer;
  color:#fff;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.popup-inner{
  flex-direction:column;
}

.info-box{
  width:100%;
}

.icon{
  font-size:26px; /* dễ bấm hơn */
}

nav button{
  font-size:14px;
  padding:10px;
}

header{
  font-size:18px;
}

}

</style>
</head>

<body>

<header>CỔ QUỐC KỲ ĐÀM</header>

<nav>
<button onclick="show('tongquan')">Tổng quan</button>
<button onclick="show('bando')">Bản đồ</button>
</nav>

<section id="tongquan" class="active">
<h2>Tổng quan</h2>
<p>Cổ Quốc được khai sáng bởi Thiên Kiếm Lão Tổ...</p>
</section>

<section id="bando">
<div class="map-container">
<img src="./images/bandochinh.jpg" class="map-bg">

<svg viewBox="0 0 1200 650">
<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region" data-map="taychau.jpg" data-name="Tây Châu"/>
<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region" data-map="bacchau.jpg" data-name="Bắc Châu"/>
<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region" data-map="dongchau.jpg" data-name="Đông Châu"/>
<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region" data-map="namchau.jpg" data-name="Nam Châu"/>
<ellipse cx="600" cy="300" rx="120" ry="90"
class="region" data-map="kinhquoc.jpg" data-name="Kinh Quốc"/>
</svg>
</div>
</section>

<!-- POPUP -->
<div id="popup" class="popup">

<span class="close" onclick="closePopup()">✖</span>

<div class="popup-inner">

<div class="map-detail" id="mapDetail">
<img id="detailImg">
</div>

<div class="info-box">
<h3 id="infoTitle">Thông tin</h3>
<p id="infoDesc">Chọn địa điểm...</p>
</div>

</div>

</div>

<script>

// TAB
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// DATA ICON
const mapIcons = {

"kinhquoc.jpg":[
{top:50,left:50,type:"hoangcung",title:"Cung Thái Hòa",desc:"Trung tâm quyền lực cao nhất"},
{top:65,left:50,type:"cong",title:"Cổng Nam",desc:"Lối ra vào chính"},
{top:45,left:30,type:"cho",title:"Chợ Tây",desc:"Khu buôn bán"},
{top:45,left:70,type:"cho",title:"Chợ Đông",desc:"Khu giao thương"}
],

"dongchau.jpg":[
{top:65,left:75,type:"cang",title:"Hải Cảng",desc:"Trung tâm giao thương"},
{top:70,left:60,type:"thuyen",title:"Thuyền buôn",desc:"Xuất nhập hàng"},
{top:45,left:55,type:"lang",title:"Làng Thổ Cổ",desc:"Khu dân cư"},
{top:50,left:80,type:"dao",title:"Phượng Hoàng đảo",desc:"Vùng linh thiêng"}
],

"namchau.jpg":[
{top:50,left:50,type:"ruong",title:"Ruộng lúa",desc:"Vựa lúa lớn"},
{top:65,left:70,type:"lang",title:"Làng ven sông",desc:"Khu dân cư"},
{top:40,left:30,type:"thap",title:"Tháp cổ",desc:"Di tích"}
],

"bacchau.jpg":[
{top:50,left:50,type:"thanh",title:"Thành băng",desc:"Pháo đài"},
{top:60,left:70,type:"lang",title:"Làng băng",desc:"Cư dân"},
{top:40,left:40,type:"rung",title:"Rừng tuyết",desc:"Nguy hiểm"}
],

"taychau.jpg":[
{top:55,left:45,type:"sa_mac",title:"Sa mạc",desc:"Khô cằn"},
{top:65,left:65,type:"oc_dao",title:"Ốc đảo",desc:"Nguồn nước"},
{top:45,left:30,type:"mo",title:"Mỏ khoáng",desc:"Tài nguyên"}
]

};

// CLICK MAP
document.querySelectorAll(".region").forEach(r=>{
r.onclick=()=>{
popup.style.display="flex";
detailImg.src="./images/"+r.dataset.map;

infoTitle.innerText = r.dataset.name;
infoDesc.innerText = "Chọn địa điểm trong vùng...";

renderIcons(r.dataset.map);
}
});

// RENDER ICON
function renderIcons(map){

let container = document.getElementById("mapDetail");
document.querySelectorAll(".icon").forEach(i=>i.remove());

mapIcons[map].forEach(i=>{

let div = document.createElement("div");
div.className="icon";
div.style.top = i.top+"%";
div.style.left = i.left+"%";
div.innerText = getIcon(i.type);

div.onclick = ()=>{
infoTitle.innerText = i.title;
infoDesc.innerText = i.desc;
};

container.appendChild(div);

});

}

// ICON
function getIcon(type){
switch(type){
case "hoangcung": return "🏯";
case "cong": return "🚪";
case "cho": return "🏪";
case "cang": return "⚓";
case "thuyen": return "⛵";
case "dao": return "🏝️";
case "lang": return "🏠";
case "ruong": return "🌾";
case "thap": return "🗼";
case "thanh": return "🏰";
case "rung": return "🌲";
case "sa_mac": return "🏜️";
case "oc_dao": return "💧";
case "mo": return "⛏️";
default: return "📍";
}
}

function closePopup(){
popup.style.display="none";
}

</script>

</body>
</html>
