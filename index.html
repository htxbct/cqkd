<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
  color:#f5e6c8;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  color:#ffd700;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  background:#5a3d2b;
}

nav button{
  padding:10px;
  border:none;
  color:#ffd700;
  background:none;
  cursor:pointer;
}

section{
  display:none;
  padding:15px;
}
.active{ display:block; }

/* MAP */
.map-container{ position:relative; }
.map-bg{ width:100%; }

svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}

.region{
  fill:transparent;
  cursor:pointer;
}

/* ===== POPUP ===== */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-inner{
  display:flex;
  gap:15px;
  max-width:900px;
  width:95%;
}

/* MAP DETAIL */
.map-detail{
  position:relative;
  flex:1;
}

.map-detail img{
  width:100%;
  border-radius:10px;
  display:block;
}

/* SVG chuẩn scale */
.map-detail svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:auto;
}

/* vùng chi tiết */
.sub-region{
  fill:transparent;
  cursor:pointer;
}

.sub-region:hover{
  fill:rgba(255,215,0,0.35);
}

/* INFO */
.info-box{
  width:250px;
  background:#fff8e7;
  color:#000;
  padding:10px;
  border-radius:10px;
}

.close{
  position:absolute;
  top:10px;
  right:20px;
  font-size:24px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .popup-inner{
    flex-direction:column;
  }
  .info-box{
    width:100%;
  }
}
</style>
</head>

<body>

<header>CỔ QUỐC KỲ ĐÀM</header>

<nav>
<button onclick="show('tongquan')">Tổng quan</button>
<button onclick="show('bando')">Bản đồ</button>
<button onclick="show('nghe')">Nghề</button>
</nav>

<section id="tongquan" class="active">
<h2>Tổng quan</h2>
<p>Cổ Quốc được khai sáng bởi Thiên Kiếm Lão Tổ...</p>
</section>

<section id="bando">
<div class="map-container">
<img src="./images/bandochinh.jpg" class="map-bg">

<svg viewBox="0 0 1200 650" preserveAspectRatio="xMidYMid meet">
<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region" data-name="Tây Châu" data-img="taychau.jpg"/>
<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region" data-name="Bắc Châu" data-img="bacchau.jpg"/>
<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region" data-name="Đông Châu" data-img="dongchau.jpg"/>
<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region" data-name="Nam Châu" data-img="namchau.jpg"/>
<ellipse cx="600" cy="300" rx="120" ry="90"
class="region" data-name="Kinh Quốc" data-img="kinhquoc.jpg"/>
</svg>
</div>
</section>

<section id="nghe">
<h2>Hệ thống nghề nghiệp</h2>
<p>Chọn nghề để xem mô tả...</p>
</section>

<!-- POPUP -->
<div id="popup" class="popup">

<span class="close" onclick="closePopup()">X</span>

<div class="popup-inner">

<div class="map-detail">
<img id="detailImg">
<svg id="detailSVG" viewBox="0 0 1500 800" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div class="info-box">
<h3 id="infoTitle">Thông tin</h3>
<p id="infoDesc">Bấm vào vùng để xem...</p>
</div>

</div>
</div>

// CLICK MAP CHÍNH (DUY NHẤT 1 LẦN)
document.querySelectorAll(".region").forEach(r=>{
r.onclick=()=>{

let key = r.dataset.img.replace(".jpg","");
detailImg.src="./images/"+r.dataset.img;
detailSVG.innerHTML="";

// load vùng con
if(maps[key]){
maps[key].forEach(v=>{

poly.setAttribute("class","sub-region");

detailSVG.appendChild(poly);
});
}
