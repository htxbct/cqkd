```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  color:#fff;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

/* MAP */
.map-container{
  position:relative;
  max-width:1200px;
  margin:auto;
  overflow:hidden;
}

.map-bg{
  width:100%;
  display:block;
}

/* SVG */
svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* REGION */
.region{
  fill: rgba(255,215,0,0.12);
  stroke: rgba(255,215,0,0.6);
  stroke-width:2;
  cursor:pointer;
  transition:0.3s;
}

.region:hover{
  fill: rgba(255,215,0,0.55);
  filter: drop-shadow(0 0 15px gold);
}

/* TOOLTIP */
.tooltip{
  position:fixed;
  background:#000;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
  pointer-events:none;
  opacity:0;
  transition:0.2s;
}

/* ZOOM */
.zooming{
  transition: transform 0.6s ease;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#fff8e7;
  padding:20px;
  border-radius:12px;
  text-align:center;
  max-width:900px;
}

.popup img{
  width:100%;
  border-radius:10px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:24px;
}
</style>
</head>

<body>

<header>
<h1>CỔ QUỐC KỲ ĐÀM</h1>
</header>

<div class="map-container">

<img src="./images/bandochinh.jpg" id="map" class="map-bg">

<svg viewBox="0 0 1200 650">

<!-- TÂY CHÂU -->
<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region"
data-name="Tây Châu"
data-img="taychau.jpg"
data-x="200" data-y="300"></path>

<!-- BẮC CHÂU -->
<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region"
data-name="Bắc Châu"
data-img="bacchau.jpg"
data-x="600" data-y="120"></path>

<!-- ĐÔNG CHÂU -->
<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region"
data-name="Đông Châu"
data-img="dongchau.jpg"
data-x="1000" data-y="300"></path>

<!-- NAM CHÂU -->
<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region"
data-name="Nam Châu"
data-img="namchau.jpg"
data-x="600" data-y="520"></path>

<!-- KINH QUỐC -->
<ellipse cx="600" cy="300" rx="120" ry="90"
class="region"
data-name="Kinh Quốc"
data-img="kinhquoc.jpg"
data-x="600" data-y="300"></ellipse>

</svg>

</div>

<div id="tooltip" class="tooltip"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">&times;</span>
    <h2 id="title"></h2>
    <img id="img">
    <p id="desc"></p>
  </div>
</div>

<script>
const tooltip = document.getElementById("tooltip");
const map = document.getElementById("map");

document.querySelectorAll(".region").forEach(r => {

  // TOOLTIP
  r.addEventListener("mousemove", e=>{
    tooltip.innerText = r.dataset.name;
    tooltip.style.left = e.clientX + 15 + "px";
    tooltip.style.top = e.clientY + 15 + "px";
    tooltip.style.opacity = 1;
  });

  r.addEventListener("mouseleave", ()=>{
    tooltip.style.opacity = 0;
  });

  // CLICK
  r.addEventListener("click", ()=>{

    let x = r.dataset.x;
    let y = r.dataset.y;

    let scale = 2;

    let offsetX = (600 - x) * (scale - 1);
    let offsetY = (325 - y) * (scale - 1);

    map.classList.add("zooming");
    map.style.transform = `scale(${scale}) translate(${offsetX}px, ${offsetY}px)`;

    setTimeout(()=>{
      document.getElementById("popup").style.display="flex";
      document.getElementById("title").innerText = r.dataset.name;
      document.getElementById("img").src = "./images/" + r.dataset.img;
      document.getElementById("desc").innerText = "Thông tin về " + r.dataset.name;
    },600);

  });

});

function closePopup(){
  document.getElementById("popup").style.display="none";
  map.style.transform="scale(1)";
}
</script>

</body>
</html>
