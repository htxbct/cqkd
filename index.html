<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fff8e7;
  color: #4b2e2e;
}

header {
  background: linear-gradient(90deg, #d4a373, #fff, #8b5e3c);
  text-align: center;
  padding: 20px;
}

nav {
  display: flex;
  justify-content: center;
  background: #8b5e3c;
}

nav a {
  color: white;
  padding: 12px 18px;
  cursor: pointer;
}

nav a:hover { background: #d4a373; }

section { display: none; padding: 20px; }
.active { display: block; }

.map-container {
  position: relative;
  max-width: 900px;
  margin: auto;
  overflow: hidden;
}

.map-container img {
  width: 100%;
  transition: transform 0.5s ease;
}

.area {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
}

.area:hover {
  box-shadow: 0 0 20px gold;
}

.tooltip {
  position: absolute;
  background: #4b2e2e;
  color: white;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
  display: none;
}

.popup {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:#fff8e7;
  padding:20px;
  border-radius:12px;
  max-width:700px;
  text-align:center;
  animation: zoomIn 0.4s ease;
}

@keyframes zoomIn {
  from { transform: scale(0.5); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

.close {
  float:right;
  cursor:pointer;
  font-size:24px;
}

</style>
</head>
<body>

<header>
<h1>CỔ QUỐC KỲ ĐÀM</h1>
</header>

<nav>
<a onclick="showSection('tongquan')">Tổng quan</a>
<a onclick="showSection('bando')">Bản đồ</a>
<a onclick="showSection('nghenghiep')">Nghề nghiệp</a>
<a onclick="showSection('khac')">Khác</a>
</nav>

<section id="tongquan" class="active">
<h2>Giới thiệu</h2>
<p>Cổ Quốc là vùng đất huyền thoại.</p>
<p id="founder"></p>
</section>

<section id="bando">
<h2>Bản đồ</h2>

<div class="map-container" id="map">
<img id="mainMap" src="./images/bandochinh.jpg">

<div class="area" style="top:25%;left:70%;width:100px;height:100px;" 
 onmouseenter="showTip(event,'Đông Châu')" 
 onmouseleave="hideTip()" 
 onclick="openMap('dongchau',0.8, -200, -50)"></div>

<div class="area" style="top:5%;left:40%;width:100px;height:100px;" 
 onmouseenter="showTip(event,'Bắc Châu')" 
 onmouseleave="hideTip()" 
 onclick="openMap('bacchau',0.8, 0, 0)"></div>

<div class="area" style="top:35%;left:5%;width:100px;height:100px;" 
 onmouseenter="showTip(event,'Tây Châu')" 
 onmouseleave="hideTip()" 
 onclick="openMap('taychau',0.8, 200, 0)"></div>

<div class="area" style="top:70%;left:40%;width:100px;height:100px;" 
 onmouseenter="showTip(event,'Nam Châu')" 
 onmouseleave="hideTip()" 
 onclick="openMap('namchau',0.8, 0, 100)"></div>

<div class="area" style="top:40%;left:45%;width:100px;height:100px;" 
 onmouseenter="showTip(event,'Kinh Quốc')" 
 onmouseleave="hideTip()" 
 onclick="openMap('kinhquoc',1.2, 0, 0)"></div>

<div id="tooltip" class="tooltip"></div>
</div>

</section>

<section id="nghenghiep"><p>Nghề nghiệp...</p></section>
<section id="khac"><p>Khác...</p></section>

<div id="popup" class="popup">
<div class="popup-content">
<span class="close" onclick="closePopup()">&times;</span>
<h3 id="popup-title"></h3>
<img id="popup-img" style="width:100%">
<p id="popup-text"></p>
</div>
</div>

<script>
function showSection(id){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// hiệu ứng chữ
const text="Thiên Kiếm Lão Tổ - người khai sáng Cổ Quốc";
const founder=document.getElementById("founder");
text.split("").forEach((c,i)=>{
 let span=document.createElement("span");
 span.textContent=c;
 span.style.opacity=0;
 span.style.animation=`fadeIn 0.5s ${i*0.05}s forwards`;
 founder.appendChild(span);
});

// tooltip
function showTip(e,text){
 let tip=document.getElementById("tooltip");
 tip.style.display="block";
 tip.innerText=text;
 tip.style.left=e.pageX+10+"px";
 tip.style.top=e.pageY+10+"px";
}
function hideTip(){
 document.getElementById("tooltip").style.display="none";
}

// zoom + popup
function openMap(region,scale,tx,ty){
 let map=document.getElementById("mainMap");
 map.style.transform=`scale(${scale}) translate(${tx}px,${ty}px)`;

 setTimeout(()=>{
  document.getElementById("popup").style.display="flex";
  document.getElementById("popup-title").innerText=region.toUpperCase();
  document.getElementById("popup-img").src=`./images/${region}.jpg`;
  document.getElementById("popup-text").innerText="Thông tin về "+region;
 },500);
}

function closePopup(){
 document.getElementById("popup").style.display="none";
 document.getElementById("mainMap").style.transform="scale(1)";
}
</script>

</body>
</html>
