<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
  color:#f5e6c8;
}

header{
  text-align:center;
  padding:12px;
  font-size:20px;
  font-weight:bold;
  color:#ffd700;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

nav{
  display:flex;
  justify-content:center;
  background:#5a3d2b;
}

nav button{
  flex:1;
  padding:12px;
  border:none;
  color:#ffd700;
  background:none;
}

section{ display:none; padding:12px; }
.active{ display:block; }

/* MAP */
.map-container{ position:relative; }
.map-bg{ width:100%; }

svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}

.region{ fill:transparent; cursor:pointer; }

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.popup-inner{
  display:flex;
  gap:10px;
  width:100%;
  max-width:1000px;
}

.map-detail{
  position:relative;
  flex:1;
}

.map-detail img{
  width:100%;
  border-radius:10px;
}

.map-detail svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}

/* vùng click */
.zone{
  fill: rgba(255,255,255,0);
  cursor:pointer;
}

.zone:hover{
  fill: rgba(255,255,255,0.2);
}

/* info */
.info-box{
  width:260px;
  background:#fff8e7;
  color:#000;
  padding:10px;
  border-radius:10px;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:26px;
  color:#fff;
  cursor:pointer;
}

/* mobile */
@media(max-width:768px){
.popup-inner{ flex-direction:column; }
.info-box{ width:100%; }
}

</style>
</head>

<body>

<header>CỔ QUỐC KỲ ĐÀM</header>

<nav>
<button onclick="show('tongquan')">Tổng quan</button>
<button onclick="show('bando')">Bản đồ</button>
</nav>

<section id="tongquan" class="active">
<h2>Tổng quan</h2>
<p>Cổ Quốc được khai sáng bởi Thiên Kiếm Lão Tổ...</p>
</section>

<section id="bando">
<div class="map-container">
<img src="./images/bandochinh.jpg" class="map-bg">

<svg viewBox="0 0 1200 650">
<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region" data-map="taychau.jpg" data-name="Tây Châu"/>
<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region" data-map="bacchau.jpg" data-name="Bắc Châu"/>
<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region" data-map="dongchau.jpg" data-name="Đông Châu"/>
<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region" data-map="namchau.jpg" data-name="Nam Châu"/>
<ellipse cx="600" cy="300" rx="120" ry="90"
class="region" data-map="kinhquoc.jpg" data-name="Kinh Quốc"/>
</svg>
</div>
</section>

<!-- POPUP -->
<div id="popup" class="popup">

<span class="close" onclick="closePopup()">✖</span>

<div class="popup-inner">

<div class="map-detail">
<img id="detailImg">
<svg id="detailSVG" viewBox="0 0 1000 600"></svg>
</div>

<div class="info-box">
<h3 id="infoTitle">Thông tin</h3>
<p id="infoDesc">Chọn khu vực...</p>
</div>

</div>

</div>

<script>

// TAB
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ===== DATA VẼ CHUẨN =====
const mapZones = {

"kinhquoc.jpg":[
{path:"M420,220 L580,220 L600,300 L400,300 Z",title:"Cung Thái Hòa",desc:"Hoàng cung trung tâm"},
{path:"M450,300 L550,300 L550,380 L450,380 Z",title:"Cổng Nam",desc:"Lối ra chính"},
{path:"M300,260 L380,260 L380,330 L300,330 Z",title:"Chợ Tây",desc:"Khu buôn bán"},
{path:"M620,260 L700,260 L700,330 L620,330 Z",title:"Chợ Đông",desc:"Giao thương"}
],

"dongchau.jpg":[
{path:"M700,350 L900,350 L900,520 L700,520 Z",title:"Hải Cảng",desc:"Trung tâm giao thương biển"},
{path:"M550,420 L700,550 L500,550 Z",title:"Thuyền buôn",desc:"Vận chuyển hàng"},
{path:"M500,250 L650,350 L400,350 Z",title:"Làng Thổ Cổ",desc:"Khu dân cư"}
],

"namchau.jpg":[
{path:"M400,300 L650,300 L650,450 L400,450 Z",title:"Ruộng lúa",desc:"Vựa lúa quốc gia"},
{path:"M650,450 L800,550 L650,550 Z",title:"Làng ven sông",desc:"Dân cư"}
],

"bacchau.jpg":[
{path:"M400,250 L600,250 L600,400 L400,400 Z",title:"Thành băng",desc:"Pháo đài"},
{path:"M600,400 L750,500 L550,500 Z",title:"Làng băng",desc:"Cư dân"}
],

"taychau.jpg":[
{path:"M350,300 L650,300 L650,450 L350,450 Z",title:"Sa mạc",desc:"Vùng khô cằn"},
{path:"M600,450 L750,550 L550,550 Z",title:"Ốc đảo",desc:"Nguồn nước"},
{path:"M300,250 L400,350 L250,350 Z",title:"Mỏ khoáng",desc:"Tài nguyên"}
]

};

// CLICK REGION
document.querySelectorAll(".region").forEach(r=>{
r.onclick=()=>{
popup.style.display="flex";
detailImg.src="./images/"+r.dataset.map;

infoTitle.innerText = r.dataset.name;
infoDesc.innerText = "Chọn khu vực trong bản đồ...";

renderZones(r.dataset.map);
}
});

// RENDER ZONE
function renderZones(map){

let svg = document.getElementById("detailSVG");
svg.innerHTML="";

mapZones[map].forEach(z=>{

let p = document.createElementNS("http://www.w3.org/2000/svg","path");
p.setAttribute("d", z.path);
p.setAttribute("class","zone");

p.onclick = ()=>{
infoTitle.innerText = z.title;
infoDesc.innerText = z.desc;
};

svg.appendChild(p);

});

}

function closePopup(){
popup.style.display="none";
}

</script>

</body>
</html>
