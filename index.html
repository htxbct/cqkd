<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổ Quốc Kỳ Đàm</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#1a1a1a;
  color:#f5e6c8;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  color:#ffd700;
  background:linear-gradient(90deg,#5a3d2b,#c9a66b,#5a3d2b);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  background:#5a3d2b;
}

nav button{
  padding:10px;
  border:none;
  color:#ffd700;
  background:none;
  cursor:pointer;
}

/* LOGIN BOX */
.login{
  text-align:center;
  padding:10px;
  background:#2c1b10;
}

.login input{
  padding:5px;
}

section{
  display:none;
  padding:15px;
}

.active{
  display:block;
}

/* MAP */
.map-container{
  position:relative;
}
.map-bg{ width:100%; }
svg{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}
.region{
  fill:transparent;
  cursor:pointer;
}

/* JOB */
.job-box{
  text-align:center;
}

.spin-btn{
  padding:12px 20px;
  background:gold;
  border:none;
  cursor:pointer;
  font-size:16px;
}

.result{
  margin-top:20px;
  font-size:20px;
  color:#ffd700;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#fff8e7;
  color:#000;
  padding:15px;
  border-radius:10px;
  max-width:90%;
}

.popup img{ width:100%; }
</style>
</head>

<body>

<header>CỔ QUỐC KỲ ĐÀM</header>

<!-- LOGIN -->
<div class="login">
<input id="username" placeholder="Nhập tên...">
<button onclick="login()">Đăng nhập</button>
<span id="userDisplay"></span>
</div>

<nav>
<button onclick="show('tongquan')">Tổng quan</button>
<button onclick="show('bando')">Bản đồ</button>
<button onclick="show('nghe')">Nghề</button>
<button onclick="show('luat')">Luật</button>
</nav>

<section id="tongquan">
<h2>Tổng quan</h2>
<p>Cổ Quốc được khai sáng bởi Thiên Kiếm Lão Tổ...</p>
</section>

<section id="bando">
<div class="map-container">
<img src="./images/bandochinh.jpg" class="map-bg">

<svg viewBox="0 0 1200 650">
<path d="M50,200 L350,120 L380,300 L200,450 L80,400 Z"
class="region" data-name="Tây Châu" data-img="taychau.jpg"/>
<path d="M350,50 L850,50 L800,200 L400,200 Z"
class="region" data-name="Bắc Châu" data-img="bacchau.jpg"/>
<path d="M850,150 L1150,200 L1100,500 L900,450 L800,300 Z"
class="region" data-name="Đông Châu" data-img="dongchau.jpg"/>
<path d="M350,400 L800,400 L850,600 L300,600 Z"
class="region" data-name="Nam Châu" data-img="namchau.jpg"/>
<ellipse cx="600" cy="300" rx="120" ry="90"
class="region" data-name="Kinh Quốc" data-img="kinhquoc.jpg"/>
</svg>
</div>
</section>

<!-- NGHỀ RANDOM -->
<section id="nghe">
<h2>🎲 Quay nghề</h2>

<div class="job-box">
<button class="spin-btn" onclick="spinJob()">QUAY NGAY</button>

<div class="result" id="jobResult">Chưa có nghề</div>
</div>
</section>

<section id="luat">
<h2>Luật lệ</h2>
<p>Các quy tắc của Cổ Quốc...</p>
</section>

<!-- POPUP MAP -->
<div id="popup" class="popup">
<div class="popup-content">
<span onclick="closePopup()">X</span>
<h2 id="title"></h2>
<img id="img">
</div>
</div>

<script>

// ===== ACCOUNT =====
let currentUser = localStorage.getItem("user");

function login(){
let name = document.getElementById("username").value;
if(!name) return alert("Nhập tên!");

localStorage.setItem("user", name);
currentUser = name;

loadUser();
}

function loadUser(){
if(currentUser){
document.getElementById("userDisplay").innerText = "👤 " + currentUser;
}
}

// ===== TAB =====
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
localStorage.setItem("page", id);
}

// ===== LOAD =====
window.onload = function(){
loadUser();

let page = localStorage.getItem("page") || "tongquan";
show(page);

// load job theo user
if(currentUser){
let job = localStorage.getItem("job_"+currentUser);
if(job){
showJobResult(job);
}
}
}

// ===== MAP =====
document.querySelectorAll(".region").forEach(r=>{
r.onclick=()=>{
popup.style.display="flex";
title.innerText=r.dataset.name;
img.src="./images/"+r.dataset.img;
}
});

function closePopup(){
popup.style.display="none";
}

// ===== RANDOM JOB =====
const jobs = [
{key:"Y sư", desc:"Cứu thế cứu nạn"},
{key:"Thương nhân", desc:"Buôn bán thiên hạ"},
{key:"Nông dân", desc:"Nuôi sống quốc gia"},
{key:"Quý tộc", desc:"Thống trị lãnh đạo"}
];

function spinJob(){

if(!currentUser) return alert("Đăng nhập trước!");

let roll = Math.floor(Math.random()*jobs.length);
let job = jobs[roll];

showJobResult(job);

// lưu theo user
localStorage.setItem("job_"+currentUser, JSON.stringify(job));
}

function showJobResult(job){
if(typeof job === "string") job = JSON.parse(job);

document.getElementById("jobResult").innerHTML =
"🏆 " + job.key + "<br>" + job.desc;
}

</script>

</body>
</html>
